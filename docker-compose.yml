services:
  mongodb:
    image: mongo:7
    container_name: wp_labs_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-wp_labs}
    ports:
      - "27017:27017"
    volumes:
      - wp_labs_mongo:/data/db
    networks:
      - wp_labs_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wp_labs_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis_dev_password}", "--appendonly", "yes"]
    volumes:
      - wp_labs_redis:/data
    networks:
      - wp_labs_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: wp_labs_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - wp_labs_rabbitmq:/var/lib/rabbitmq
    networks:
      - wp_labs_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: wp_labs_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - wp_labs_minio:/data
    networks:
      - wp_labs_network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: wp_labs_app
    restart: unless-stopped
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://admin:secret@mongodb:27017/wp_labs?authSource=admin}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-wp_labs}
      PORT: 4200
      APP_ENV: ${APP_ENV:-development}
      CLUSTER_SOURCE: ${CLUSTER_SOURCE:-demo}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,https://buglivesmatter.github.io}
      # JWT конфигурация
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      # OAuth2 Yandex
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET}
      YANDEX_CALLBACK_URL: ${YANDEX_CALLBACK_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev_password}
      CACHE_TTL_DEFAULT: ${CACHE_TTL_DEFAULT:-300}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-wp-labs-files}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      QUEUE_USER_REGISTERED: ${QUEUE_USER_REGISTERED:-wp.auth.user.registered}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_AUTH: ${SMTP_AUTH:-plain}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:4200}
    ports:
      - "4200:4200"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - wp_labs_network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_NEUROOPS_MODE: api
        VITE_CLUSTER_API_URL: ""
    container_name: wp_labs_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - app
    networks:
      - wp_labs_network

volumes:
  wp_labs_mongo:
  wp_labs_redis:
  wp_labs_minio:
  wp_labs_rabbitmq:

networks:
  wp_labs_network:
    driver: bridge
